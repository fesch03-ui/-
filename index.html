        function buildQuiz() {
            const quizDiv = document.getElementById("quiz");
            quizDiv.innerHTML = '';
            questions.forEach((q, idx) => {
                const qBlock = document.createElement('div');
                qBlock.className = 'question-block';
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.textContent = q.text;
                qBlock.appendChild(qText);
                q.options.forEach((opt, optIdx) => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'option';
                    const input = document.createElement('input');
                    input.type = 'radio';
                    input.name = `q${idx}`;
                    input.value = optIdx;
                    input.id = `q${idx}_${optIdx}`;
                    const label = document.createElement('label');
                    label.htmlFor = `q${idx}_${optIdx}`;
                    label.textContent = opt;
                    optDiv.appendChild(input);
                    optDiv.appendChild(label);
                    qBlock.appendChild(optDiv);
                });
                quizDiv.appendChild(qBlock);
            });
        }

        function checkAnswers() {
            let correctCount = 0;
            questions.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                if (selected && q.correct.includes(parseInt(selected.value))) {
                    correctCount++;
                }
            });
            const percent = Math.round((correctCount / questions.length) * 100);
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = 'block';
            resultDiv.classList.remove('result-excellent', 'result-good', 'result-satisfactory', 'result-unsatisfactory');
            let gradeText = '';
            if (percent === 100) {
                resultDiv.classList.add('result-excellent');
                gradeText = 'Отличный результат';
            } else if (percent >= 90) {
                resultDiv.classList.add('result-good');
                gradeText = 'Хороший результат';
            } else if (percent >= 80) {
                resultDiv.classList.add('result-satisfactory');
                gradeText = 'Удовлетворительный результат';
            } else {
                resultDiv.classList.add('result-unsatisfactory');
                gradeText = 'Неудовлетворительный результат';
            }
            resultDiv.innerHTML = `<div style="font-size:22px; margin-bottom:6px;">${correctCount} из ${questions.length} (${percent}%)</div><div>${gradeText}</div>`;
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function resetQuiz() {
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = 'none';
            resultDiv.classList.remove('result-excellent', 'result-good', 'result-satisfactory', 'result-unsatisfactory');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        buildQuiz();
    </script>
